name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly, Monday 6am UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: github/codeql-action/init@8272c299f21ca24af15dfe9ac0971ba969e5e0d5  # v3
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/autobuild@8272c299f21ca24af15dfe9ac0971ba969e5e0d5  # v3

      - uses: github/codeql-action/analyze@8272c299f21ca24af15dfe9ac0971ba969e5e0d5  # v3
        with:
          category: "/language:javascript-typescript"
